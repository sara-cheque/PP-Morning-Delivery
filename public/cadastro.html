<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles/cadastro.css">
</head>

<body>

    <div class="nav-bar">
        <span class="logotipo">Logo</span>
        <ul class="nav-links">
            <li><a href="#">Home</a></li>
            <li><a href="diario.html">Diario</a></li>
            <li><a href="login.html">Login</a></li>
        </ul>
    </div>

    <div class="container">
        <div class="blockA">

        </div>
        <div class="blockB">
            <p class="title">Cadastrar</p>
            <div>
                <p>Nome</p>
                <Input id="inpCadNome"></Input>
            </div>
            <div>
                <p>E-Mail</p>
                <input type="text" id="inpCadEmail" onchange="cadConfirmaEmail(inpCadEmail.value)">
                <div id="erroEmail"></div>
            </div>
            <div>
                <p>Senha</p>
                <input type="text" id="inpCadSenha" oninput="cadConfirmaSenha(inpCadSenha.value)">
                <div id="erroSenha"></div>
            </div>
            <div>
                <p>Confirme sua senha</p>
                <input type="text" id="inpCadConfSenha" onchange="cadConfirmaSenhaIgual(inpCadConfSenha.value, inpCadSenha.value)">
                <div id="erroConfirmeSenha"></div>
            </div>
            <button onclick="cadastrar()">Cadastrar</button>
        </div>
    </div>


</body>

<script src="scripts/login-cadastro.js"></script>

</html>
