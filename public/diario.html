<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

<body>

   
<div class="nav-bar">

    <div class="container-header">

        <div class="container-clock">
            <div>
                <span id="horas">00</span>
                <span class="tempo">Horas</span>
            </div>
            <div>
                <span id="minutos">00</span>
                <span class="tempo">Minutos</span>
            </div>
            <div>
                <span id="segundos">00</span>
                <span class="tempo">Segundos</span>
            </div> 
        </div>
        
    </div>
    <!-- HEADER + O RELOGIO -->

    <div class="container">

        <div class="bloqA">

            <div class="to-do-list">

                <p>To Do List</p>

                <div class="BloqCheckBox ">
                    <ul id="to-do-list">
                    </ul>
                </div>

                <input type="text" id="inpNameToDo" placeholder="Nova tarefa">
                <button onclick="novaTarefaFixa()" id="btnToDo">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                    </svg>
                </button>
            </div>

            <div class="registoHumor">
                <p>Hoje o dia foi...</p>
                <ul id="lista-humor">
                    <li><button onclick="cadastrarHumorDia(0)"></button>Feliz</li>
                    <li><button onclick="cadastrarHumorDia(1)"></button>Estresssante</li>
                    <li><button onclick="cadastrarHumorDia(2)"></button>Cansativo</li>
                    <li><button onclick="cadastrarHumorDia(3)"></button>Tenso</li>
                    <li><button onclick="cadastrarHumorDia(4)"></button>Tediante</li>
                    <li><button onclick="cadastrarHumorDia(5)"></button>Triste</li>
                </ul>
                
                
               
                
                
            </div>


        </div>

        <div class="bloqB">

            <!-- <p>O que voçê vai fazer...</p> -->

            <div class="agendaManha">
                <ul id="to-do-list-manha"></ul>
                <input type="text" id="inpNameToDoManha" placeholder="Nova tarefa">
                <button onclick="novaTarefaManha()" id="btnToDoManha">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                    </svg>
                </button>

            </div>
            <div class="agendaTarde">
                <ul id="to-do-list-tarde"></ul>
                <input type="text" id="inpNameToDoTarde" placeholder="Nova tarefa">
                <button onclick="novaTarefaTarde()" id="btnToDoTarde">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                    </svg>
                </button>
            </div>
            <div class="agendaNoite">
                <ul id="to-do-list-noite">
                                        <li>teste</li>
                    <li>teste</li>
                    <li>teste</li>
                    <li>teste</li>
                </ul>
                <input type="text" id="inpNameToDoNoite" placeholder="Nova tarefa">
                <button onclick="novaTarefaNoite()" id="btnToDoNoite">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-plus" viewBox="0 0 16 16">
                    <path d="M8 4a.5.5 0 0 1 .5.5v3h3a.5.5 0 0 1 0 1h-3v3a.5.5 0 0 1-1 0v-3h-3a.5.5 0 0 1 0-1h3v-3A.5.5 0 0 1 8 4"/>
                    </svg>
                </button>
            </div>



        </div>
    </div>

    <div class="container">

        <div class="bloqA diario">
            <p class="titleDiario">DIARIO</p>
            <p class="subTitle">Cada dia registrado importa</p>
            <textarea name="" id=""></textarea>

        </div>


    </div>
